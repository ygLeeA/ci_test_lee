name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  IMAGE_NAME: my-app
  CONTAINER_NAME: my-app-container
  APP_PORT: 8080

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Docker 빌드 → 실행 → Cypress E2E 테스트
  # ─────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Run Docker container
        run: docker run -d -p ${{ env.APP_PORT }}:8080 --name ${{ env.CONTAINER_NAME }} ${{ env.IMAGE_NAME }}:latest

      - name: Wait for app (health check)
        run: |
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${{ env.APP_PORT }} > /dev/null 2>&1; then
              echo "App is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 3s..."
            sleep 3
          done
          echo "App failed to start within 90s"
          exit 1

      - name: Install Node dependencies
        working-directory: src/main/view
        run: npm ci

      - name: Run Cypress E2E tests
        working-directory: src/main/view
        run: npx cypress run --config baseUrl=http://localhost:${{ env.APP_PORT }}

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: src/main/view/cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

      - name: Show container logs (on failure)
        if: failure()
        run: docker logs ${{ env.CONTAINER_NAME }}

      - name: Cleanup container
        if: always()
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

  # ─────────────────────────────────────────────
  # Job 2: Tomcat 9 배포 (main 브랜치 push 시에만)
  # ─────────────────────────────────────────────
  deploy:
    needs: build-and-test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WAR with Maven
        run: mvn clean package -DskipTests -q

      - name: Deploy to Tomcat 9
        env:
          # Settings > Variables > Actions 에서 TOMCAT_HOME 설정
          # 예: /opt/tomcat9
          TOMCAT_HOME: ${{ vars.TOMCAT_HOME }}
        run: |
          echo "Stopping Tomcat..."
          $TOMCAT_HOME/bin/shutdown.sh || true
          sleep 5

          echo "Removing old deployment..."
          rm -rf $TOMCAT_HOME/webapps/ROOT $TOMCAT_HOME/webapps/ROOT.war

          echo "Deploying WAR..."
          cp target/demo-0.0.1-SNAPSHOT.war $TOMCAT_HOME/webapps/ROOT.war

          echo "Starting Tomcat..."
          $TOMCAT_HOME/bin/startup.sh

          echo "Waiting for Tomcat to start..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Deploy successful!"
              exit 0
            fi
            sleep 3
          done
          echo "Tomcat failed to start"
          exit 1
